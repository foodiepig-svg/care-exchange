# render.yaml — Care Exchange deployment blueprint
#
# Deploy with:
#   1. Push this file to GitHub
#   2. Go to https://dashboard.render.com/blueprints
#   3. Connect your GitHub repo → auto-deploys on push
#
# Or use the Render CLI:
#   render blueprint apply render.yaml

services:
  # ── Web App (Docker) ───────────────────────────────────────────────────────
  - name: care-exchange
    plan: free
    dockerfilepath: ./Dockerfile
    healthCheckPath: /health
    # Pull port from Dockerfile EXPOSE (10000)
    port: 10000

    envVars:
      - key: FLASK_ENV
        value: production

      - key: DATABASE_URL
        # Replace with your actual Render PostgreSQL connection string
        # Format: postgresql://user:password@host:5432/dbname
        sync: false

      - key: SECRET_KEY
        generateValue: true

      - key: JWT_SECRET_KEY
        generateValue: true

      - key: CORS_ORIGINS
        # Same origin — nginx proxies /api internally, no CORS needed
        value: ""

      - key: UPLOAD_FOLDER
        value: /tmp/careexchange/uploads

    # Environment variables from a group (optional: use Render dashboard to edit)
    # envVars:
    #   - sync: false
    #     name: CARE_EXCHANGE_ADMIN_EMAIL
    #     value: admin@example.com

  # ── (Optional) Background Worker for async tasks ──────────────────────────
